services:
  - type: web
    name: sanjeevni-backend
    rootDir: backend
    env: docker
    plan: starter
    region: ohio
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: MURF_API_KEY
        sync: false
      - key: MURF_VOICE_ID
        value: Natalie
      - key: MURF_LOCALE
        value: en-US
      - key: SWASYA_API_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODEPATH
        value: node
