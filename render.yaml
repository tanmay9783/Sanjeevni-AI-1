services:
  - type: web
    name: sanjeevni-backend
    env: docker
    plan: starter
    region: ohio
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: MURF_API_KEY
        sync: false
      - key: MURF_VOICE_ID
        value: Natalie
      - key: MURF_LOCALE
        value: en-US
      - key: SWASYA_API_URL
        value: https://swasya-backend.onrender.com
      - key: CORS_ORIGIN
        value: "*"
      - key: NODEPATH
        value: node
